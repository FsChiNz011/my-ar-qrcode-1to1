<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Architecture 1:1 (Absolute Free-Lock)</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #0a0a0f; 
      font-family: system-ui, -apple-system, sans-serif;
      user-select: none;
    }
    
    /* กล่องควบคุมปุ่มล็อกบริเวณส่วนล่างของจอ */
    #action-container {
      position: fixed; 
      bottom: 50px; 
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999 !important;
      width: 85%;
      max-width: 280px;
      pointer-events: auto;
    }

    /* ดีไซน์ปุ่มสถานะสีทอง */
    .ar-btn {
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-align: center;
      text-transform: uppercase;
      border: 2px solid #c8a96e;
      background: rgba(10, 10, 15, 0.9);
      color: #c8a96e;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    /* สถานะเมื่อสแกนเจอและพร้อมให้กดล็อก */
    .ar-btn.active-ready {
      background: #c8a96e !important;
      color: #0a0a0f !important;
      border-color: #c8a96e !important;
      animation: pulse 1.5s infinite;
    }

    /* สถานะเมื่อล็อกพิกัดและย้ายฐานโมเดลสำเร็จแล้ว */
    .ar-btn.active-locked {
      background: #12121a !important;
      color: #4ade80 !important;
      border-color: #4ade80 !important;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(200, 169, 110, 0.5); }
      70% { box-shadow: 0 0 0 10px rgba(200, 169, 110, 0); }
      100% { box-shadow: 0 0 0 0 rgba(200, 169, 110, 0); }
    }
  </style>
</head>
<body>

  <div id="action-container">
    <button id="ar-gate-button" class="ar-btn" onclick="toggleARLock()">
      กำลังค้นหา QR Code...
    </button>
  </div>

  <a-scene id="main-scene"
           mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
           color-space="sRGB" 
           renderer="colorManagement: true, physicallyCorrectLights: true" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="buildingModel" src="./TEST5m.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
      
      <a-entity id="model-wrapper" position="0 0 0" rotation="-90 0 0">
        <a-gltf-model id="actual-model" src="#buildingModel" position="0 0 0" rotation="0 0 0" scale="1 1 1"></a-gltf-model>
      </a-entity>

    </a-entity>
  </a-scene>

  <script>
    const mainScene = document.querySelector('#main-scene');
    const targetEl = document.querySelector('#ar-target');
    const modelWrapper = document.querySelector('#model-wrapper');
    const actionBtn = document.querySelector('#ar-gate-button');
    
    let isLocked = false;       // เช็คสถานะการล็อกค้าง
    let isTargetFound = false;  // เช็คว่ากล้องกำลังเห็นกระดาษอยู่ไหม

    // 1. เมื่อสแกนเจอ QR Code บนกระดาษครั้งแรก
    targetEl.addEventListener("targetFound", event => {
      isTargetFound = true;
      if (isLocked) return;

      actionBtn.className = "ar-btn active-ready";
      actionBtn.textContent = "กดเพื่อล็อกตำแหน่ง (LOCK AR)";
    });
    
    // 2. เมื่อกล้องขยับหนีจนหลุดจากกระดาษ
    targetEl.addEventListener("targetLost", event => {
      isTargetFound = false;
      
      // ถ้ากดล็อกไปแล้ว แม้ระบบ MindAR จะสั่งปิดหน้าต่างหลัก แต่โมเดลเราย้ายบ้านไปแล้ว จึงจะไม่หายครับ
      if (isLocked) return;
      
      actionBtn.className = "ar-btn";
      actionBtn.textContent = "กำลังค้นหา QR Code...";
    });

    // 3. ฟังก์ชันการย้ายค่ายและล็อกพิกัดวัตถุแบบถาวร
    function toggleARLock() {
      if (!isLocked) {
        // ต้องส่องกล้องให้เจอภาพก่อนถึงจะกดล็อกได้
        if (!isTargetFound) return;

        // ดึงค่าพิกัดตำแหน่ง (World Position/Rotation) ล่าสุด ณ วินาทีที่กดล็อก
        const currentPosition = new AFRAME.THREE.Vector3();
        const currentRotation = new AFRAME.THREE.Quaternion();
        const currentScale = new AFRAME.THREE.Vector3();
        
        modelWrapper.object3D.updateMatrixWorld();
        modelWrapper.object3D.matrixWorld.decompose(currentPosition, currentRotation, currentScale);

        // [จุดสำคัญ] ย้ายโครงสร้างโมเดลออกจากกลุ่มของ Marker ไปเป็นลูกตรงของฉากหลัก (a-scene)
        mainScene.appendChild(modelWrapper);

        // บังคับตรึงพิกัดแบบ Absolute ในโลก AR ให้อยู่จุดเดิมตอนที่กดเป๊ะๆ
        modelWrapper.object3D.position.copy(currentPosition);
        modelWrapper.object3D.quaternion.copy(currentRotation);
        
        isLocked = true;
        
        // อัปเดต UI ปุ่มเป็นสีเขียวแจ้งเตือนล็อกสมบูรณ์
        actionBtn.className = "ar-btn active-locked";
        actionBtn.textContent = "ล็อกสำเร็จ! เดินสำรวจได้เลย";
      } else {
        // ถ้าระบบล็อกอยู่แล้วผู้ใช้กดซ้ำ จะทำการรีโหลดหน้าเว็บเพื่อเริ่มต้นสแกนพิกัดใหม่สะดวกที่สุด
        window.location.reload();
      }
    }
  </script>
</body>
</html>
