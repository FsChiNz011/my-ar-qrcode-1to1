<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Architecture – Stable Lock</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0a0a0f;
      font-family: system-ui, sans-serif;
      user-select: none;
    }

    /* ─── Status bar top ─── */
    #status-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 48px 20px 16px;
      background: linear-gradient(to bottom, rgba(10,10,15,0.75), transparent);
      z-index: 9999;
      display: flex; align-items: center; gap: 10px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4a4640; flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.found   { background: #c8a96e; animation: blink 1.2s infinite; }
    .dot.locked  { background: #4ade80; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    #status-text {
      font-size: 12px; letter-spacing: 0.2em;
      text-transform: uppercase; color: #8a8070;
      transition: color 0.3s;
    }
    #status-text.found  { color: #c8a96e; }
    #status-text.locked { color: #4ade80; }

    /* ─── Bottom action button ─── */
    #action-container {
      position: fixed; bottom: 48px; left: 50%;
      transform: translateX(-50%);
      z-index: 9999; width: 85%; max-width: 300px;
      display: flex; flex-direction: column; gap: 12px;
      align-items: center;
    }

    .ar-btn {
      width: 100%; padding: 16px;
      border-radius: 3px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.25em; text-align: center;
      text-transform: uppercase;
      border: 1.5px solid #2a2a35;
      background: rgba(10,10,15,0.85);
      color: #4a4640;
      cursor: default;
      transition: all 0.25s ease;
    }
    .ar-btn.ready {
      border-color: #c8a96e;
      color: #c8a96e;
      cursor: pointer;
      animation: pulse-gold 1.8s infinite;
    }
    .ar-btn.locked {
      border-color: #4ade80;
      color: #4ade80;
      background: rgba(10,10,15,0.9);
      cursor: pointer;
      animation: none;
    }
    @keyframes pulse-gold {
      0%   { box-shadow: 0 0 0 0 rgba(200,169,110,.5); }
      70%  { box-shadow: 0 0 0 10px rgba(200,169,110,0); }
      100% { box-shadow: 0 0 0 0 rgba(200,169,110,0); }
    }

    .btn-reset {
      font-size: 10px; letter-spacing: 0.2em;
      color: #3a3835; text-decoration: none;
      text-transform: uppercase; cursor: pointer;
      background: none; border: none; padding: 4px;
      display: none;
    }
    .btn-reset.visible { display: block; color: #5a5850; }
  </style>
</head>
<body>

  <!-- Status -->
  <div id="status-bar">
    <div class="dot" id="dot"></div>
    <div id="status-text">กำลังค้นหา Marker...</div>
  </div>

  <!-- Controls -->
  <div id="action-container">
    <button class="ar-btn" id="lock-btn" disabled onclick="handleLockBtn()">
      ค้นหา Marker อยู่...
    </button>
    <button class="btn-reset" id="reset-btn" onclick="window.location.reload()">
      รีเซ็ต / สแกนใหม่
    </button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="buildingModel" src="./TEST5m.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!--
      FIX กลับหัว:
      - ไม่ใส่ rotation บน anchor-pivot แล้ว
      - GLB ที่ Export จาก SketchUp มักหน้าหัว +Z แกน Y ขึ้น
      - ถ้ายังกลับหัวอยู่ ให้ลอง rotation="0 180 0" บน building-wrapper
    -->
    <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
      <a-entity id="building-wrapper" position="0 0 0" rotation="0 0 0">
        <a-gltf-model
          id="original-model"
          src="#buildingModel"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1">
        </a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- โมเดล Clone จะถูกใส่ที่นี่หลัง lock -->
    <a-entity id="world-container"></a-entity>

  </a-scene>

  <script>
    // ─── Elements ───────────────────────────────────────────
    const targetEl      = document.querySelector('#ar-target');
    const originalModel = document.querySelector('#original-model');
    const wrapper       = document.querySelector('#building-wrapper');
    const worldContainer= document.querySelector('#world-container');
    const lockBtn       = document.querySelector('#lock-btn');
    const resetBtn      = document.querySelector('#reset-btn');
    const dot           = document.querySelector('#dot');
    const statusText    = document.querySelector('#status-text');

    let isTargetFound = false;
    let isLocked      = false;

    // ─── Patch: ป้องกัน MindAR ซ่อน entity เมื่อ targetLost ───
    // MindAR เรียก setAttribute('visible', false) บน mindar-image-target entity
    // เราจะ override ไม่ให้มันซ่อนเมื่อล็อกแล้ว
    const origSetAttr = targetEl.setAttribute.bind(targetEl);
    targetEl.setAttribute = function(name, val) {
      if (isLocked && name === 'visible' && val === false) return; // บล็อก
      origSetAttr(name, val);
    };

    // ─── Target Found ────────────────────────────────────────
    targetEl.addEventListener('targetFound', () => {
      isTargetFound = true;
      if (isLocked) return;
      dot.className = 'dot found';
      statusText.textContent = 'พบ Marker แล้ว — กดล็อกตำแหน่ง';
      statusText.className = 'found';
      lockBtn.textContent = 'ล็อกตำแหน่งโมเดล (LOCK)';
      lockBtn.className = 'ar-btn ready';
      lockBtn.disabled = false;
    });

    // ─── Target Lost ─────────────────────────────────────────
    targetEl.addEventListener('targetLost', () => {
      isTargetFound = false;
      if (isLocked) return; // ล็อกแล้ว → ไม่ต้องทำอะไร
      dot.className = 'dot';
      statusText.textContent = 'กำลังค้นหา Marker...';
      statusText.className = '';
      lockBtn.textContent = 'ค้นหา Marker อยู่...';
      lockBtn.className = 'ar-btn';
      lockBtn.disabled = true;
    });

    // ─── Lock ─────────────────────────────────────────────────
    function handleLockBtn() {
      if (isLocked) return;
      if (!isTargetFound) return;

      // อ่าน world matrix ของ wrapper (ครอบ rotation fix ทั้งหมด)
      wrapper.object3D.updateMatrixWorld(true);
      const worldPos   = new THREE.Vector3();
      const worldQuat  = new THREE.Quaternion();
      const worldScale = new THREE.Vector3();
      wrapper.object3D.matrixWorld.decompose(worldPos, worldQuat, worldScale);

      // สร้าง anchor entity ใน world-container แล้วใส่ position/quaternion ทันที
      // ไม่สร้าง a-gltf-model ใหม่ — ย้าย wrapper ออกมาแทน (ไม่มีช่วงว่าง)
      const anchor = document.createElement('a-entity');
      anchor.id = 'locked-anchor';
      worldContainer.appendChild(anchor);

      // ย้าย wrapper จาก ar-target → locked-anchor
      anchor.appendChild(wrapper);

      // ตรึงพิกัดและ rotation ใน world space
      anchor.object3D.position.copy(worldPos);
      anchor.object3D.quaternion.copy(worldQuat);
      // Scale ปกติจาก wrapper เดิม (ไม่ต้อง set ซ้ำ เพราะ wrapper ยังอยู่)

      isLocked = true;

      // อัปเดต UI
      dot.className = 'dot locked';
      statusText.textContent = 'ล็อกแล้ว — เดินสำรวจได้เลย';
      statusText.className = 'locked';
      lockBtn.textContent = '✓ ล็อกสำเร็จ';
      lockBtn.className = 'ar-btn locked';
      lockBtn.disabled = true;
      resetBtn.className = 'btn-reset visible';
    }
  </script>
</body>
</html>
