<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Architecture 1:1 (QR Code Anchor)</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; background: #0a0a0f; }
    
    /* UI ข้อความแจ้งเตือนผู้ใช้ */
    #scan-overlay {
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .scan-gate {
      font-family: sans-serif; font-size: 14px; letter-spacing: 0.1em;
      color: #c8a96e; background: rgba(10, 10, 15, 0.75);
      padding: 12px 24px; border-radius: 4px;
      border: 1px solid rgba(200, 169, 110, 0.3);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="scan-overlay">
    <div class="scan-gate" id="prompt-text">กรุณาส่องกล้องไปที่ QR Code อ้างอิง</div>
  </div>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
           color-space="sRGB" 
           renderer="colorManagement: true, physicallyCorrectLights: true" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="buildingModel" src="./TEST5m.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
      <a-gltf-model src="#buildingModel" 
                    position="0 0 0" 
                    rotation="0 0 0" 
                    scale="1 1 1">
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    // ดักจับ Event เพื่อเปิด/ปิด UI แจ้งเตือนเวลาสแกนเจอภาพ
    const targetEl = document.querySelector('#ar-target');
    const promptText = document.querySelector('#prompt-text');
    
    targetEl.addEventListener("targetFound", event => {
      promptText.style.display = "none"; // ซ่อนข้อความเมื่อเจอ QR Code
    });
    
    targetEl.addEventListener("targetLost", event => {
      promptText.style.display = "block"; // แสดงข้อความเมื่อกล้องหลุดจาก QR Code
      promptText.textContent = "สัญญาณหลุด: กรุณาส่องกล้องไปที่ QR Code อีกครั้ง";
    });
  </script>
</body>
</html>
