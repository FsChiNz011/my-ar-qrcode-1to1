<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Architecture 1:1 (Stable Clone Lock)</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #0a0a0f; 
      font-family: system-ui, -apple-system, sans-serif;
      user-select: none;
    }
    
    /* กล่องควบคุมปุ่มล็อกบริเวณส่วนล่างของจอ */
    #action-container {
      position: fixed; 
      bottom: 50px; 
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999 !important;
      width: 85%;
      max-width: 280px;
      pointer-events: auto;
    }

    /* ดีไซน์ปุ่มสถานะ */
    .ar-btn {
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-align: center;
      text-transform: uppercase;
      border: 2px solid #c8a96e;
      background: rgba(10, 10, 15, 0.9);
      color: #c8a96e;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    /* สถานะเมื่อสแกนเจอและพร้อมให้กดล็อก */
    .ar-btn.active-ready {
      background: #c8a96e !important;
      color: #0a0a0f !important;
      border-color: #c8a96e !important;
      animation: pulse 1.5s infinite;
    }

    /* สถานะเมื่อล็อกพิกัดและตรึงโมเดลสำเร็จแล้ว */
    .ar-btn.active-locked {
      background: #12121a !important;
      color: #4ade80 !important;
      border-color: #4ade80 !important;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(200, 169, 110, 0.5); }
      70% { box-shadow: 0 0 0 10px rgba(200, 169, 110, 0); }
      100% { box-shadow: 0 0 0 0 rgba(200, 169, 110, 0); }
    }
  </style>
</head>
<body>

  <div id="action-container">
    <button id="ar-gate-button" class="ar-btn" onclick="toggleARLock()">
      กำลังค้นหา QR Code...
    </button>
  </div>

  <a-scene id="main-scene"
           mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
           color-space="sRGB" 
           renderer="colorManagement: true, physicallyCorrectLights: true" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="buildingModel" src="./TEST5m.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
      <a-entity id="anchor-pivot" position="0 0 0" rotation="-90 0 0">
        <a-gltf-model id="original-model" src="#buildingModel" position="0 0 0" rotation="0 0 0" scale="1 1 1"></a-gltf-model>
      </a-entity>
    </a-entity>

    <a-entity id="world-fixed-container"></a-entity>

  </a-scene>

  <script>
    const mainScene = document.querySelector('#main-scene');
    const targetEl = document.querySelector('#ar-target');
    const anchorPivot = document.querySelector('#anchor-pivot');
    const originalModel = document.querySelector('#original-model');
    const fixedContainer = document.querySelector('#world-fixed-container');
    const actionBtn = document.querySelector('#ar-gate-button');
    
    let isLocked = false;       // สถานะการล็อกพิกัด
    let isTargetFound = false;  // สถานะตรวจเจอภาพ

    // 1. จังหวะที่ระบบสแกนเจอ QR Code บนกระดาษ
    targetEl.addEventListener("targetFound", event => {
      isTargetFound = true;
      if (isLocked) return;

      actionBtn.className = "ar-btn active-ready";
      actionBtn.textContent = "กดเพื่อล็อกตำแหน่ง (LOCK AR)";
    });
    
    // 2. จังหวะที่กล้องเบนหนีหลุดจากกระดาษ
    targetEl.addEventListener("targetLost", event => {
      isTargetFound = false;
      if (isLocked) return; // หากล็อกแล้ว ปล่อยให้โมเดลโคลนทำงานต่อไป
      
      actionBtn.className = "ar-btn";
      actionBtn.textContent = "กำลังค้นหา QR Code...";
    });

    // 3. ฟังก์ชันระบบปุ่มล็อกพิกัดแบบโคลนวัตถุตัดขาดจากสัญญาณกล้อง
    function toggleARLock() {
      if (!isLocked) {
        // ต้องส่องเจอภาพก่อนถึงจะกดล็อกได้
        if (!isTargetFound) return;

        // คำนวณหาค่าพิกัดและองศาจริงในระนาบโลก (Absolute World Position/Rotation) ของโมเดล ณ วินาทีนั้น
        const worldPos = new AFRAME.THREE.Vector3();
        const worldRot = new AFRAME.THREE.Quaternion();
        const worldScale = new AFRAME.THREE.Vector3();
        
        originalModel.object3D.updateMatrixWorld();
        originalModel.object3D.matrixWorld.decompose(worldPos, worldRot, worldScale);

        // สั่งซ่อนโมเดลตัวจริงที่ผูกกับเทมเพลตของ MindAR ออกไปก่อน
        originalModel.setAttribute('visible', false);

        // สร้างโมเดลจำลองตัวใหม่ขึ้นมา (Clone) เพื่อบรรจุเข้าสู่ระบบฉากหลักโดยตรง
        const clonedModel = document.createElement('a-gltf-model');
        clonedModel.setAttribute('src', '#buildingModel');
        clonedModel.setAttribute('scale', '1 1 1');
        clonedModel.id = "permanently-locked-model";

        // ส่งโมเดลตัวใหม่เข้าไปในตู้คอนเทนเนอร์ภายนอก
        fixedContainer.appendChild(clonedModel);

        // บังคับตรึงพิกัด สเกล และองศาให้ตรงตามเป้าหมายเป๊ะๆ ไม่ให้กลับหัวและไม่เคลื่อนที่
        clonedModel.addEventListener('model-loaded', () => {
          clonedModel.object3D.position.copy(worldPos);
          clonedModel.object3D.quaternion.copy(worldRot);
          clonedModel.object3D.visible = true;
        });
        
        // บังคับประคองตำแหน่งในระดับ Object3D ทันที
        clonedModel.object3D.position.copy(worldPos);
        clonedModel.object3D.quaternion.copy(worldRot);

        isLocked = true;
        
        // อัปเดตสถานะปุ่มสีเขียว ล็อกเสร็จสมบูรณ์
        actionBtn.className = "ar-btn active-locked";
        actionBtn.textContent = "ล็อกสำเร็จ! เดินสำรวจได้เลย";
      } else {
        // หากต้องการยกเลิกหรือตั้งหลักสแกนใหม่ ให้สั่งรีโหลดหน้าเว็บเพื่อเคลียร์ค่าหน่วยความจำ
        window.location.reload();
      }
    }
  </script>
</body>
</html>
