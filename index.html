<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Architecture 1:1</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #0a0a0f; 
      font-family: system-ui, -apple-system, sans-serif;
      user-select: none;
    }
    
    /* กล่องควบคุมปุ่มล็อกแบบเด่นชัดกลางจอส่วนล่าง */
    #action-container {
      position: fixed; 
      bottom: 50px; 
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999 !important; /* ดันขึ้นมาให้อยู่ชั้นบนสุดไม่โดนกล้องบัง */
      width: 85%;
      max-width: 280px;
      pointer-events: auto;
    }

    /* ดีไซน์ปุ่มสถานะสีทองเด่นชัด */
    .ar-btn {
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-align: center;
      text-transform: uppercase;
      border: 2px solid #c8a96e;
      background: rgba(10, 10, 15, 0.9);
      color: #c8a96e;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    /* สถานะเมื่อสแกนเจอและพร้อมให้กดล็อก */
    .ar-btn.active-ready {
      background: #c8a96e !important;
      color: #0a0a0f !important;
      border-color: #c8a96e !important;
      animation: pulse 1.5s infinite;
    }

    /* สถานะเมื่อล็อกพิกัดเรียบร้อยแล้ว */
    .ar-btn.active-locked {
      background: #12121a !important;
      color: #4ade80 !important; /* เปลี่ยนเป็นสีเขียวแจ้งสถานะล็อกสมบูรณ์ */
      border-color: #4ade80 !important;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(200, 169, 110, 0.5); }
      70% { box-shadow: 0 0 0 10px rgba(200, 169, 110, 0); }
      100% { box-shadow: 0 0 0 0 rgba(200, 169, 110, 0); }
    }
  </style>
</head>
<body>

  <div id="action-container">
    <button id="ar-gate-button" class="ar-btn" onclick="toggleARLock()">
      กำลังค้นหา QR Code...
    </button>
  </div>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
           color-space="sRGB" 
           renderer="colorManagement: true, physicallyCorrectLights: true" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="buildingModel" src="./TEST5m.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
      <a-gltf-model src="#buildingModel" 
                    position="0 0 0" 
                    rotation="-90 0 0" 
                    scale="1 1 1">
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const targetEl = document.querySelector('#ar-target');
    const modelEntity = targetEl.querySelector('a-gltf-model');
    const actionBtn = document.querySelector('#ar-gate-button');
    
    let isLocked = false;       // สถานะตรึงตำแหน่ง
    let isTargetFound = false;  // สถานะส่องเจอภาพหน้างาน

    // 1. ตรวจจับเมื่อสแกนเจอภาพเป้าหมาย (QR Code)
    targetEl.addEventListener("targetFound", event => {
      isTargetFound = true;
      if (isLocked) return;

      // ปรับปรุงปุ่มเปลี่ยนเป็นสีทองเพื่อให้กดล็อกพิกัด
      actionBtn.className = "ar-btn active-ready";
      actionBtn.textContent = "กดเพื่อล็อกตำแหน่ง (LOCK AR)";
    });
    
    // 2. ตรวจจับเมื่อกล้องเบนหนีจนหลุดจากเป้าหมาย
    targetEl.addEventListener("targetLost", event => {
      isTargetFound = false;
      
      // ถ้ากดล็อกไว้แล้ว แม้สัญญาณหลุดก็บังคับเปิดโมเดลค้างไว้ตลอดไป
      if (isLocked) {
        if (modelEntity) modelEntity.setAttribute('visible', true);
        return;
      }
      
      // ถ้ายังไม่ได้ล็อกแล้วหลุด ให้รีเซ็ตกลับสถานะค้นหา
      actionBtn.className = "ar-btn";
      actionBtn.textContent = "กำลังค้นหา QR Code...";
    });

    // 3. ฟังก์ชันหลักสำหรับกดล็อกและปลดล็อกตำแหน่งด้วยปุ่มเดียว
    function toggleARLock() {
      if (!isLocked) {
        // เงื่อนไข: จะยอมให้กดล็อกได้ก็ต่อเมื่อกล้องกำลังส่องเจอภาพเท่านั้น
        if (!isTargetFound) return;

        isLocked = true;
        if (modelEntity) modelEntity.setAttribute('visible', true);
        
        // เปลี่ยนหน้าตาปุ่มเป็นโหมดล็อกพิกัดสีเขียว
        actionBtn.className = "ar-btn active-locked";
        actionBtn.textContent = "ล็อกแล้ว (กดเพื่อปลดล็อก)";
      } else {
        // หากกดซ้ำตอนล็อกอยู่ จะทำการคลายล็อกเพื่อตั้งหลักสแกนใหม่
        isLocked = false;
        if (modelEntity) modelEntity.setAttribute('visible', false); // เคลียร์โมเดลชั่วคราว
        
        actionBtn.className = "ar-btn";
        actionBtn.textContent = "กำลังค้นหา QR Code...";
      }
    }

    // ฟังก์ชันเสริมบังคับเรนเดอร์ในกรณีวน Loop เหตุการณ์หลุด
    setInterval(() => {
      if (isLocked && modelEntity) {
        modelEntity.setAttribute('visible', true);
      }
    }, 200);
  </script>
</body>
</html>
